name: Build and Package App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Fixed: Using macos-13 to ensure compatibility with Intel Macs
        os: [ubuntu-latest, windows-latest, macos-13]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt

      # Fixed: Building from the .spec file to embed Mac folder permissions
      - name: Build with PyInstaller
        run: |
          pyinstaller "Quick Sketcher.spec"

      # Windows: Zip the dist/"Quick Sketcher" folder
      - name: Zip Windows Release
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path "dist/Quick Sketcher" -DestinationPath QuickSketcher-Windows.zip

      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: QuickSketcher-Windows
          path: QuickSketcher-Windows.zip

      # Linux: Zip the dist/"Quick Sketcher" folder
      - name: Zip Linux Release
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist
          zip -r ../QuickSketcher-Linux.zip "Quick Sketcher"

      - name: Upload Linux Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: QuickSketcher-Linux
          path: QuickSketcher-Linux.zip

      # macOS: Zip the dist/"Quick Sketcher.app" bundle
      - name: Zip macOS Release
        if: matrix.os == 'macos-13'
        run: |
          cd dist
          zip -r ../QuickSketcher-Mac.zip "Quick Sketcher.app"

      - name: Upload macOS Artifact
        if: matrix.os == 'macos-13'
        uses: actions/upload-artifact@v4
        with:
          name: QuickSketcher-MacOS
          path: QuickSketcher-Mac.zip