name: Build and Package App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------------------
      # BUILD: WINDOWS & LINUX (PyInstaller)
      # -----------------------------------------------------------
      - name: Install PyInstaller (Win/Linux)
        if: matrix.os != 'macos-13'
        run: pip install pyinstaller

      - name: Build with PyInstaller
        if: matrix.os != 'macos-13'
        run: pyinstaller "Quick Sketcher.spec"

      # -----------------------------------------------------------
      # BUILD: MACOS (py2app)
      # -----------------------------------------------------------
      - name: Build with py2app (macOS)
        if: matrix.os == 'macos-13'
        run: |
          pip install py2app
          python setup.py py2app

      # -----------------------------------------------------------
      # PACKAGING & UPLOAD
      # -----------------------------------------------------------
      - name: Zip Windows Release
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path "dist/Quick Sketcher" -DestinationPath QuickSketcher-Windows.zip

      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: QuickSketcher-Windows
          path: QuickSketcher-Windows.zip

      - name: Zip Linux Release
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist
          zip -r ../QuickSketcher-Linux.zip "Quick Sketcher"

      - name: Upload Linux Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: QuickSketcher-Linux
          path: QuickSketcher-Linux.zip

      - name: Zip macOS Release
        if: matrix.os == 'macos-13'
        run: |
          cd dist
          zip -r ../QuickSketcher-Mac.zip "Quick Sketcher.app"

      - name: Upload macOS Artifact
        if: matrix.os == 'macos-13'
        uses: actions/upload-artifact@v4
        with:
          name: QuickSketcher-MacOS
          path: QuickSketcher-Mac.zip