name: Build and Package App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # -----------------------------------------------------------
      # LINUX UI DEPENDENCIES
      # -----------------------------------------------------------
      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------------------
      # BUILD: WINDOWS & LINUX (Foolproof PyInstaller)
      # -----------------------------------------------------------
      - name: Build with PyInstaller (Win/Linux)
        if: runner.os != 'macOS'
        run: |
          pip install pyinstaller
          # Bypassing the .spec file to guarantee a single file output
          pyinstaller --onefile --windowed src/mainUI.py --name "Quick Sketcher"

      # -----------------------------------------------------------
      # BUILD: MACOS (Raw py2app)
      # -----------------------------------------------------------
      - name: Build with py2app (macOS)
        if: runner.os == 'macOS'
        run: |
          pip install py2app
          python setup.py py2app

      # -----------------------------------------------------------
      # PACKAGING (Creating the Zips)
      # -----------------------------------------------------------
      - name: Zip Windows Release
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "dist\Quick Sketcher.exe" -DestinationPath QuickSketcher-Windows.zip

      - name: Zip Linux Release
        if: runner.os == 'Linux'
        run: cd dist && zip -r ../QuickSketcher-Linux.zip "Quick Sketcher"

      - name: Zip macOS Release
        if: runner.os == 'macOS'
        run: cd dist && zip -r ../QuickSketcher-MacOS.zip "Quick Sketcher.app"

      # -----------------------------------------------------------
      # UPLOAD (Grabbing all 3 Zips)
      # -----------------------------------------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickSketcher-${{ runner.os }}
          path: QuickSketcher-*.zip