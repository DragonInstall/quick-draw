name: Build and Package App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # -----------------------------------------------------------
      # LINUX / WINDOWS DEPENDENCIES
      # -----------------------------------------------------------
      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------------------
      # BUILD: WINDOWS & LINUX (PyInstaller)
      # -----------------------------------------------------------
      - name: Install PyInstaller (Win/Linux)
        if: runner.os != 'macOS'
        run: pip install pyinstaller

      - name: Build with PyInstaller (Win/Linux)
        if: runner.os != 'macOS'
        run: pyinstaller "Quick Sketcher.spec"

      # -----------------------------------------------------------
      # LINUX: Create Universal AppImage
      # -----------------------------------------------------------
      - name: Create AppImage (Linux Only)
        if: runner.os == 'Linux'
        run: |
          mkdir -p AppDir/usr/bin
          cp "dist/Quick Sketcher" AppDir/usr/bin/QuickSketcher
          
          echo "[Desktop Entry]
          Type=Application
          Name=Quick Sketcher
          Exec=QuickSketcher
          Icon=quicksketcher
          Categories=Utility;" > AppDir/QuickSketcher.desktop
          
          touch AppDir/quicksketcher.png
          
          wget https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage AppDir QuickSketcher-Linux.AppImage

      # -----------------------------------------------------------
      # BUILD: MACOS (py2app)
      # -----------------------------------------------------------
      - name: Build with py2app (macOS)
        if: runner.os == 'macOS'
        run: |
          pip install py2app
          python setup.py py2app

      # -----------------------------------------------------------
      # PACKAGING: WINDOWS & MACOS
      # -----------------------------------------------------------
      - name: Zip Windows Release
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "dist\Quick Sketcher.exe" -DestinationPath QuickSketcher-Windows.zip

      - name: Zip macOS Release
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r ../QuickSketcher-MacOS.zip "Quick Sketcher.app"

      # -----------------------------------------------------------
      # UPLOAD ALL ARTIFACTS
      # -----------------------------------------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickSketcher-${{ runner.os }}
          path: |
            QuickSketcher-*.zip
            QuickSketcher-*.AppImage