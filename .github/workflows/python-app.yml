name: Build and Package App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconsole \
            --collect-data customtkinter \
            --exclude-module unittest \
            --exclude-module sqlite3 \
            --exclude-module email \
            --exclude-module pydoc \
            --exclude-module html \
            --exclude-module http \
            --name="QuickDraw" src/mainUI.py

      # Windows: Zip the dist/QuickDraw folder
      - name: Zip Windows Release
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path dist/QuickDraw -DestinationPath QuickDraw-Windows.zip

      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: QuickDraw-Windows
          path: QuickDraw-Windows.zip

      # Linux: Zip the dist/QuickDraw folder
      - name: Zip Linux Release
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist
          zip -r ../QuickDraw-Linux.zip QuickDraw

      - name: Upload Linux Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: QuickDraw-Linux
          path: QuickDraw-Linux.zip

      # macOS: Zip the dist/QuickDraw.app bundle
      - name: Zip macOS Release
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -r ../QuickDraw-Mac.zip QuickDraw.app

      - name: Upload macOS Artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: QuickDraw-MacOS
          path: QuickDraw-Mac.zip